version: "3"
services:

  backend:
    build:
      context: ./backend
      args:
        - DEV_USER_UID=${LOCAL_USER_UID}
        - DEV_USER_GID=${LOCAL_USER_GID}
    ports:
      - ${BACKEND_PORT}:80
    volumes:
      - ../src:/var/www
      - ./logs/php:/var/log/php
      - ./logs/apache:/var/log/apache2
      - ./backend/php.ini:/usr/local/etc/php/php.ini
    working_dir: /var/www
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_READ_HOST=db
      - DB_PORT=3306
      - DB_READ_PORT=3306
      - DB_DATABASE=${DB_NAME}
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=null
      - XDEBUG_PORT=${XDEBUG_PORT}

  db:
    build:
      context: ./mysql
      args:
        - MYSQL_DATABASE=${DB_NAME}
        - MYSQL_USER=${DB_USER}
    volumes:
      - db-store:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
    ports:
      - ${DB_PORT}:3306

  redis:
    image: redis:6.2-alpine
    ports:
      - ${REDIS_PORT}:6379

volumes:
  db-store:
