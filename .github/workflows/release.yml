name: Release

# @model-checking/spec の配布物(tarball)をGitHub Releaseに添付する。
# npmレジストリには公開せず、利用者はReleaseのURLを依存に書いて入れる
# (npmはgit依存のサブディレクトリ指定に対応しないため、モノレポの
#  packages/spec だけをgit URLで入れることはできない)。
#
# 通常は packages/spec の version を上げて main に push すれば
# tag-on-version.yml がタグを切り、workflow_call でこのワークフローを呼ぶ。
# 手でタグを切る(spec-v* を push する)経路も残してある。
#
#   npm version --workspace @model-checking/spec patch
#   git push
on:
  push:
    tags: ["spec-v*"]
  workflow_call:
    inputs:
      tag:
        description: リリースするタグ(spec-v<version>)。tag-on-version.yml から渡す
        required: true
        type: string
  workflow_dispatch:

permissions:
  contents: write # Releaseの作成と資産のアップロードに要る

jobs:
  release:
    runs-on: ubuntu-latest
    # push経由なら github.ref_name、workflow_call経由なら inputs.tag。
    # どちらの経路でも同じタグ名で以降を回す
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # タグとpackage.jsonのversionがずれたまま配布すると、
      # 利用者が入れたURLの中身と表示バージョンが食い違う
      - name: タグとバージョンの一致を確認
        run: |
          tag_version="${TAG#spec-v}"
          pkg_version="$(node -p "require('./packages/spec/package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "タグ($tag_version)とpackage.jsonのversion($pkg_version)が一致しません" >&2
            exit 1
          fi

      - name: テスト
        run: npm test

      - name: 型チェック
        run: npm run typecheck

      # 配布物が利用者側で解決できることを、固めて入れて確かめてから公開する
      - name: 配布物の検証
        run: ./scripts/verify-package.sh

      - name: 配布物を固める
        id: pack
        run: |
          tarball="$(cd packages/spec && npm pack --silent)"
          echo "path=packages/spec/$tarball" >> "$GITHUB_OUTPUT"

      - name: Releaseに添付する
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" "${{ steps.pack.outputs.path }}" \
            --title "@model-checking/spec $TAG" \
            --generate-notes
