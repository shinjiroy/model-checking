name: Release on merge

# release/* ブランチの PR が main にマージされたときだけ、packages/spec の
# version から spec-v<version> タグを切ってリリースする。
#
# トリガーを「version が変わった」ではなく「リリース用ブランチがマージされた」に
# 絞っている。リリース意図をブランチ名で明示でき、リリースと無関係な
# packages/spec/package.json の変更(依存追加・スクリプト変更など)で誤って
# 発火しない。リリース用ブランチは scripts/deploy.sh が release/spec-v<version>
# として切る。
#
# GITHUB_TOKEN で push したタグは release.yml の push トリガーを発火しない
# (ワークフローの無限ループを防ぐGitHubの仕様)。そのため release.yml を
# workflow_call で明示的に呼ぶ。追加のSecret(PAT)は要らない。
on:
  pull_request:
    types: [closed]

permissions:
  contents: write # タグの作成・push に要る

jobs:
  tag:
    # release/* ブランチが実際にマージされたときだけ(閉じただけ・他ブランチは除く)
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.decide.outputs.tag }}
      created: ${{ steps.decide.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          # マージ後の main の状態(マージコミット)をタグ付けの対象にする
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0 # 既存タグの有無を見るため全履歴を取る

      - name: version からタグを決めて、無ければ切る
        id: decide
        run: |
          version="$(node -p "require('./packages/spec/package.json').version")"
          tag="spec-v$version"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          # 同じ version のタグが既にあるなら何もしない(取り違えや再実行に備えて冪等に)
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "$tag は既に存在する。スキップ" >&2
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "@model-checking/spec $version"
          git push origin "$tag"
          echo "created=true" >> "$GITHUB_OUTPUT"

  release:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
