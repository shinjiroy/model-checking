name: Deploy

# mainへの反映をGitHub Pagesへ配信する。SPAは静的ファイルのみで、
# 検査はすべて閲覧者のブラウザ内で完結する(サーバー側の実行環境を持たない)。
on:
  push:
    branches: [main]
  workflow_dispatch:

# 配信中に後続のpushが割り込んでも、進行中のデプロイは完了させる
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # 壊れたものを配信しないよう、デプロイ前にCIと同じ検証を通す
      - name: テスト
        run: npm test

      - name: 型チェック
        run: npm run typecheck

      - uses: actions/configure-pages@v5
        id: pages

      # プロジェクトサイトは /<repo>/ 配下に載るため、base をそれに合わせる
      - name: ビルド
        run: npm run -w @model-checking/web build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
