name: Spec

on:
  push:
  pull_request:

jobs:
  spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # 仕様の型エラーを落とす。ブラウザ側はトランスパイルのみで型を見ないため、
      # 型チェックはここと手元のエディタが担当する
      - name: 型チェック
        run: npm run typecheck

      # 設計に反例が出たら落とす
      - name: 検査
        run: npm run check
